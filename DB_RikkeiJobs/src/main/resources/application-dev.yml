spring:
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_rikkeijobs}?useSSL=false&allowPublicKeyRetrieval=true
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        # Batch loading để tránh N+1 query problem
        jdbc:
          batch_size: 50
          use_get_generated_keys: true
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 1MB
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:8081,http://192.168.2.174:8080}

logging:
  level:
    com.data.db_rikkeijobs: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

