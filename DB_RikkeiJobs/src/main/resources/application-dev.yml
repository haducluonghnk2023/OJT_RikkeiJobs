spring:
  application:
    name: DB_RikkeiJobs
  datasource:
    username: ${DB_USERNAME:root}
    # ⚠️ SECURITY WARNING: Default password for development only!
    # In production, use environment variables: ${DB_PASSWORD:your-secure-password}
    # NEVER commit real credentials to version control!
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_rikkeijobs}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
  jpa:
    show-sql: true  # Bật show-sql để debug
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        # Batch loading để tránh N+1 query problem
        jdbc:
          batch_size: 50
          use_get_generated_keys: true
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 1MB
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:8081}

logging:
  level:
    com.data.db_rikkeijobs: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

