name: Deploy to Windows Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build Backend
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
          check-latest: true

      - name: Build Backend
        run: |
          cd DB_RikkeiJobs
          .\gradlew.bat build -x test
        shell: powershell

      # Build Frontend Client
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nhom-5/client/package-lock.json
          check-latest: true

      - name: Build Frontend Client
        run: |
          cd nhom-5\client
          npm ci
          npm run build
        shell: powershell

      # Build Frontend Admin
      - name: Set up Node.js for Admin
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nhom-5/client_admin/package-lock.json
          check-latest: true

      - name: Build Frontend Admin
        run: |
          cd nhom-5\client_admin
          npm ci
          npm run build
        shell: powershell

      # Prepare deployment files
      - name: Prepare deployment files
        run: |
          New-Item -ItemType Directory -Force -Path "deployment"
          Copy-Item "DB_RikkeiJobs\build\libs\*.jar" -Destination "deployment\backend.jar"
          Copy-Item -Path "nhom-5\client\dist\*" -Destination "deployment\frontend-client\" -Recurse -Force
          Copy-Item -Path "nhom-5\client_admin\dist\*" -Destination "deployment\frontend-admin\" -Recurse -Force
        shell: powershell

      # Create deployment script
      - name: Create deployment package
        run: |
          Compress-Archive -Path "deployment\*" -DestinationPath "deployment.zip" -Force
        shell: powershell

      # Deploy to Windows Server (using WinRM or SSH)
      - name: Deploy to Windows Server via WinRM
        uses: appleboy/winrm-action@master
        if: github.event_name == 'push' || github.event.inputs.environment == 'production'
        with:
          host: ${{ secrets.WINDOWS_SERVER_HOST }}
          username: ${{ secrets.WINDOWS_SERVER_USERNAME }}
          password: ${{ secrets.WINDOWS_SERVER_PASSWORD }}
          port: ${{ secrets.WINDOWS_SERVER_PORT || 5985 }}
          script: |
            # Download deployment package
            # Extract and deploy files
            # Restart services if needed
            Write-Host "Deployment completed"

      # Alternative: Deploy via SCP (if SSH is enabled on Windows Server)
      - name: Deploy via SCP
        uses: appleboy/scp-action@master
        if: false  # Set to true if using SSH instead of WinRM
        with:
          host: ${{ secrets.WINDOWS_SERVER_HOST }}
          username: ${{ secrets.WINDOWS_SERVER_USERNAME }}
          password: ${{ secrets.WINDOWS_SERVER_PASSWORD }}
          port: ${{ secrets.WINDOWS_SERVER_SSH_PORT || 22 }}
          source: "deployment.zip"
          target: "C:\Deployments\"

