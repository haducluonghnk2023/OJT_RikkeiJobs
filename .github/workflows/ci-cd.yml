name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Cancel in-progress runs for the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # Build and test backend
  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
          check-latest: true

      - name: Grant execute permission for gradlew
        run: chmod +x DB_RikkeiJobs/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon
        working-directory: ${{ github.workspace }}/DB_RikkeiJobs

      - name: Run tests
        run: ./gradlew test --no-daemon
        working-directory: ${{ github.workspace }}/DB_RikkeiJobs
        continue-on-error: true

      - name: Generate test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: DB_RikkeiJobs/build/test-results/**/*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: DB_RikkeiJobs/build/libs/*.jar
          retention-days: 7

  # Build frontend client
  frontend-client:
    name: Build Frontend Client
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nhom-5/client/package-lock.json
          check-latest: true

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}/nhom-5/client

      - name: Build application
        run: npm run build
        working-directory: ${{ github.workspace }}/nhom-5/client

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-client-dist
          path: nhom-5/client/dist
          retention-days: 7

  # Build frontend admin
  frontend-admin:
    name: Build Frontend Admin
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nhom-5/client_admin/package-lock.json
          check-latest: true

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}/nhom-5/client_admin

      - name: Build application
        run: npm run build
        working-directory: ${{ github.workspace }}/nhom-5/client_admin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-dist
          path: nhom-5/client_admin/dist
          retention-days: 7

  # Deploy to production (only on main branch)
  deploy:
    name: Deploy to Production
    needs: [backend, frontend-client, frontend-admin]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/backend

      - name: Download frontend client artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-client-dist
          path: artifacts/frontend-client

      - name: Download frontend admin artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-admin-dist
          path: artifacts/frontend-admin

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp -r artifacts/backend/*.jar deployment/backend.jar
          cp -r artifacts/frontend-client deployment/frontend-client
          cp -r artifacts/frontend-admin deployment/frontend-admin
          tar -czf deployment.tar.gz deployment/

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment.tar.gz
          retention-days: 30

      # Note: Add your deployment steps here
      # For example, deploying to Windows Server via SSH or FTP
