name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rikkei-backend:latest ./DB_RikkeiJobs

      - name: Build Frontend Client Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rikkei-client:latest ./nhom-5/client

      - name: Build Frontend Admin Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rikkei-admin:latest ./nhom-5/client_admin

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rikkei-backend:latest

      - name: Push Frontend Client Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rikkei-client:latest

      - name: Push Frontend Admin Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rikkei-admin:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ~/devops_project

            docker-compose pull

            docker-compose down
            docker-compose up -d

            docker image prune -f

            docker-compose ps
